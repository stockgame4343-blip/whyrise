    <div class="tmap-bar leaders2-bar">
        <div class="tmap-bar__inner leaders2-bar__inner">
            <div class="tmap-bar__left">
                <span class="tmap-live" id="leaders2LiveWrap">
                    <span class="tmap-live__ring">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle class="tmap-live__ring-bg" cx="12" cy="12" r="9"/>
                            <circle class="tmap-live__ring-fg" id="leaders2RingFg" cx="12" cy="12" r="9"/>
                        </svg>
                    </span>
                    <span class="tmap-live__label" id="leaders2Live">LIVE</span>
                </span>
                <div class="tmap-datenav" id="leaders2DateNav">
                    <button class="tmap-datenav__btn" id="leaders2DatePrev" type="button" aria-label="이전 거래일">‹</button>
                    <span class="tmap-date" id="leaders2Date" title="클릭하여 거래일 선택">—</span>
                    <button class="tmap-datenav__btn" id="leaders2DateNext" type="button" aria-label="다음 거래일">›</button>
                </div>
                <button class="tmap-back" id="leaders2Back" type="button" hidden>← 전체</button>
            </div>
            <div class="tmap-bar__right leaders2-controls" aria-label="주도주 통합 필터">
                <div class="tmap-tabs" role="tablist" aria-label="보기 방식">
                    <button class="tmap-tab is-active" type="button" role="tab" aria-selected="true" data-view="tree">트리</button>
                    <button class="tmap-tab" type="button" role="tab" aria-selected="false" data-view="bubble">버블</button>
                </div>
                <div class="tmap-tabs leaders2-tabs--metric" role="tablist" aria-label="기준">
                    <button class="tmap-tab is-active" type="button" role="tab" aria-selected="true" data-metric="sector">주도섹터</button>
                    <button class="tmap-tab" type="button" role="tab" aria-selected="false" data-metric="theme">핫테마</button>
                    <button class="tmap-tab" type="button" role="tab" aria-selected="false" data-metric="mcap">시총</button>
                    <button class="tmap-tab" type="button" role="tab" aria-selected="false" data-metric="volume">거래량</button>
                    <button class="tmap-tab" type="button" role="tab" aria-selected="false" data-metric="change">상승률</button>
                </div>
                <div class="leaders2-extra is-disabled" id="leaders2MarketControls" aria-disabled="true">
                    <div class="tmap-tabs" role="tablist" aria-label="시장">
                        <button class="tmap-tab is-active" type="button" role="tab" aria-selected="true" aria-disabled="true" data-market="ALL" disabled>전체</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-market="KOSPI" disabled>코스피</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-market="KOSDAQ" disabled>코스닥</button>
                    </div>
                    <div class="tmap-tabs" role="tablist" aria-label="기간">
                        <button class="tmap-tab is-active" type="button" role="tab" aria-selected="true" aria-disabled="true" data-period="1d" disabled>1일</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-period="1w" disabled>1주</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-period="1m" disabled>1달</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-period="3m" disabled>3달</button>
                        <button class="tmap-tab" type="button" role="tab" aria-selected="false" aria-disabled="true" data-period="1y" disabled>1년</button>
                    </div>
                </div>
                <button class="tmap-save" id="leaders2Save" type="button" aria-label="이미지 저장" title="이미지 저장">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <main class="tmap-stage leaders2-shell" aria-label="주도주 통합 화면">
        <div class="tmap-loading leaders2-loading" id="leaders2Loading">불러오는 중...</div>
        <div class="leaders2-stack" id="leaders2Stack"></div>
