<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버블맵 — 이거왜오름?</title>
    <meta name="description" content="기간(1D/1W/1M/3M/1Y) × 개수(25/50/100) 토글 — 한국 주식 상승률 상위 종목 인터랙티브 버블맵.">
    <meta name="theme-color" content="#0a0b0f">
    <link rel="canonical" href="https://whyrise.vercel.app/bubbles.html">
    <link rel="icon" href="/og-default.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:title" content="버블맵 — 이거왜오름?">
    <meta property="og:description" content="1D/1W/1M/3M/1Y × 25/50/100 토글 인터랙티브 버블맵.">
    <meta property="og:image" content="https://whyrise.vercel.app/og-default.svg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/whyrise.css">
</head>
<body class="page-bubbles">
    <script>
    (function(){
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
    </script>

    <header class="top-bar">
        <div class="top-bar__inner frame">
            <a class="top-bar__logo" href="/">이거왜오름?</a>
            <nav class="top-bar__nav">
                <a href="/" class="top-bar__link">홈</a>
                <a href="/bubbles.html" class="top-bar__link top-bar__link--active">버블맵</a>
                <a href="/report.html" class="top-bar__link">리포트</a>
            </nav>
            <div class="top-bar__right">
                <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="bubbles-controls">
        <div class="bubbles-controls__inner">
            <div class="bubbles-controls__left">
                <div class="bubble-toggle" id="periodTabs" role="group">
                    <button data-p="d1" type="button">1D</button>
                    <button data-p="w1" class="active" type="button">1W</button>
                    <button data-p="m1" type="button">1M</button>
                    <button data-p="m3" type="button">3M</button>
                    <button data-p="y1" type="button">1Y</button>
                </div>
                <div class="bubble-toggle" id="countTabs" role="group">
                    <button data-c="25" type="button">25</button>
                    <button data-c="50" class="active" type="button">50</button>
                    <button data-c="100" type="button">100</button>
                </div>
                <div class="bubble-toggle" id="marketTabs" role="group">
                    <button data-m="ALL" class="active" type="button">ALL</button>
                    <button data-m="KOSPI" type="button">KOSPI</button>
                    <button data-m="KOSDAQ" type="button">KOSDAQ</button>
                </div>
            </div>
            <div class="bubbles-controls__right">
                <input type="text" id="bubblesSearch" class="bubbles-search" placeholder="종목 검색" />
                <span class="bubbles-stat" id="bubblesStat">—</span>
            </div>
        </div>
    </div>

    <div id="bubblesStage" class="bubbles-stage">
        <div class="loading" id="loading" style="display:flex;">버블맵 그리는 중...</div>
        <div class="message" id="message" style="display:none;"></div>
        <canvas id="bubblesCanvas"></canvas>
        <div class="bubble-tip" id="bubbleTip"></div>
    </div>

    <footer class="bubbles-foot">
        <div class="visitor-row" id="visitorRow" style="display:none;">
            <span class="visitor-row__dot"></span>
            <span><span class="visitor-row__num" id="visitorOnline">—</span>명 보는 중</span>
            <span class="visitor-row__sep">·</span>
            <span>누적 <span class="visitor-row__num" id="visitorUnique">—</span>명</span>
        </div>
        <span class="bubbles-foot__legend">크기 = 변동률 강도 · 빨강 = 상승 · 파랑 = 하락 · 드래그·검색·클릭</span>
        <a href="/admin.html" class="footer__admin-link">·</a>
    </footer>

    <script src="/js/bubbles.js"></script>
    <script src="/js/visitor.js"></script>
</body>
</html>
