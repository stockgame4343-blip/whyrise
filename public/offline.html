<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0b0f">
    <title>오프라인 · ORGO</title>
    <style>
        :root { color-scheme: dark; font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 28px;
            color: #f5f7fb;
            background:
                radial-gradient(circle at 50% 18%, rgba(49,130,246,.18), transparent 38%),
                #0a0b0f;
        }
        main { width: min(100%, 420px); text-align: center; }
        .mark {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(49,130,246,.2);
        }
        h1 { margin: 0 0 12px; font-size: 25px; letter-spacing: -.04em; }
        p { margin: 0; color: #9da5b4; font-size: 15px; line-height: 1.65; word-break: keep-all; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 28px; }
        a, button {
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2c3340;
            border-radius: 14px;
            color: #f5f7fb;
            background: #151820;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        button { border-color: #3182f6; background: #3182f6; }
    </style>
</head>
<body>
    <main>
        <img class="mark" src="/app-icon.svg" width="88" height="88" alt="">
        <h1>잠시 연결이 끊겼어요</h1>
        <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요.<br>최근에 열어본 화면은 오프라인에서도 볼 수 있습니다.</p>
        <div class="actions">
            <a href="/">홈으로</a>
            <button type="button" onclick="location.reload()">다시 시도</button>
        </div>
    </main>
</body>
</html>
