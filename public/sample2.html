<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ORGO">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <title>오늘의 대장 캘린더 - ORGO</title>
    <meta name="description" content="날짜별 대장주·대장 섹터·대장 테마를 캘린더로. 같은 대장은 같은 색으로 한 달 흐름을 한눈에.">
    <meta name="theme-color" content="#0a0b0f">
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260520g">
    <link rel="stylesheet" href="/css/whyrise.css?v=20260621d">
    <style>
        .cal-page { padding-bottom: 60px; }
        .cal-controls { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin: 6px 0 16px; }
        .cal-controls .report-date-bar { margin-left: 0; padding: 0; }

        /* 주말(토·일)은 거래 없음 → PC·모바일 모두 칼럼에서 제외, 평일 5열 */
        .cal-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cal-dow { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 4px 0; }
        .cal-dow--sun, .cal-dow--sat { display: none; }
        .cal-cell.cal-cell--weekend { display: none; }   /* .cal-cell{display:flex} 보다 명시도 높게 */

        .cal-cell {
            position: relative;
            min-height: 104px; border-radius: 14px; padding: 8px 10px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            display: flex; flex-direction: column; gap: 2px;
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }
        .cal-cell--blank { background: transparent; border-color: transparent; }
        .cal-cell--empty { background: transparent; border-color: var(--glass-border); }
        .cal-cell--weekend { opacity: .4; }
        .cal-cell--holiday { opacity: .65; }
        .cal-cell--today { background: var(--glass-bg); }
        .cal-cell--data { cursor: pointer; }
        a.cal-cell--data { text-decoration: none; }
        .cal-cell--data:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.16); border-color: var(--glass-border-strong); }

        .cal-cell__top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
        .cal-cell__date { font-size: 12px; font-weight: 700; color: var(--text-secondary); font-feature-settings: 'tnum'; }
        /* 반복 대장 ×N 배지 (우상단) — 반복 횟수 한눈에 */
        .cal-cell__badge { font-size: 10px; font-weight: 800; line-height: 1; padding: 2px 5px; border-radius: 999px;
            border: 1px solid var(--glass-border); color: var(--text-secondary); font-feature-settings: 'tnum'; flex-shrink: 0; }

        /* 대장없음·휴장·오늘 안내 → 박스(셀) 정중앙. 날짜(좌상단)와 무관하게 가운데 */
        .cal-cell__center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 8px; }
        .cal-cell__off { font-size: 11px; color: var(--text-muted); }
        .cal-cell__none { font-size: 12px; color: var(--text-muted); }
        /* 오늘(평일) — 데이터 집계 전. 박스는 활성, 안내는 상세설명 톤으로 셀 정중앙 */
        .cal-cell__pending { font-size: 11px; font-weight: 600; color: var(--text-secondary); line-height: 1.35; }

        .cal-cell__name { margin-top: 3px; font-size: 14px; font-weight: 800; color: var(--text-primary); letter-spacing: -.3px; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cal-cell__metric { margin-top: 2px; font-size: 11px; color: var(--text-secondary); font-feature-settings: 'tnum'; line-height: 1.3; }
        .cal-cell__rate { color: var(--rise); font-weight: 800; }
        .cal-cell__reason { margin-top: auto; padding-top: 3px; font-size: 11px; font-weight: 600; color: var(--text-secondary); line-height: 1.35;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .cal-legend { margin-top: 24px; }
        .cal-legend__head { font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 12px; }
        .cal-legend__items { display: flex; flex-wrap: wrap; gap: 9px; }
        .cal-legend__item { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px;
            border: 1px solid var(--glass-border); background: transparent; font-family: inherit; font-size: 14px; font-weight: 700;
            color: var(--text-primary); cursor: pointer; transition: background .15s, border-color .15s; }
        .cal-legend__item:hover { border-color: var(--glass-border-strong); }
        .cal-legend__item--active { border-color: var(--lc); }   /* 배경(알파)은 JS가 인라인으로 입힘 */
        .cal-legend__dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
        .cal-legend__count { color: var(--text-secondary); font-weight: 600; font-size: 13px; }
        .cal-legend__hint { font-size: 12px; font-weight: 500; color: var(--text-muted); }

        /* 하단 바 — 좌: 범례(여러 번 대장), 우하단: 이미지 저장 버튼 */
        .cal-foot { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
        .cal-foot .cal-legend { margin-top: 0; flex: 1 1 auto; min-width: 0; }
        .cal-save { margin-left: auto; flex-shrink: 0; display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 15px; border-radius: 999px; border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-primary); font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
            transition: background .15s, border-color .15s; }
        .cal-save:hover { background: var(--glass-bg-strong); border-color: var(--glass-border-strong); }
        .cal-save svg { width: 16px; height: 16px; flex-shrink: 0; }

        @media (max-width: 640px) {
            /* 컨트롤: 세그먼트 풀폭 + 날짜바 아래 중앙 정렬 */
            .cal-controls { gap: 8px; }
            .cal-controls .seg { flex: 1 1 100%; justify-content: center; }
            .cal-controls .seg__btn { flex: 1; padding: 7px 4px; }
            .cal-controls .report-date-bar { flex: 1 1 100%; justify-content: center; }
            .cal-grid { gap: 4px; }
            .cal-cell { min-height: 80px; padding: 6px 6px; border-radius: 11px; }
            .cal-cell__name { font-size: 12px; }
            .cal-cell__vol, .cal-cell__reason { display: none; }   /* 상승률/종목수만 */
        }
    </style>
</head>
<body>

            <div class="top-bar__right">

                </button>
                <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환">

            </div>
        </div>

    <main class="frame report-page report-page--compact">
        <header class="screening-head report-head">
            <div>
                <h1 class="screening-title report-title">대장 캘린더<button type="button" class="help-tip" data-help-title="대장 캘린더" data-help="날짜별 그날의 대장주·대장 섹터·대장 테마를 한 달 달력으로 모아 봅니다. 한 달에 두 번 이상 대장에 오른 항목은 같은 색으로 묶이고(칸 우상단 ×N) 범례에서 누르면 강조됩니다. 칸을 누르면 종목 상세나 스크리닝으로 이동합니다." aria-label="대장 캘린더 설명">?</button></h1>
            </div>
        </header>

        <div class="cal-controls">
            <div class="report-date-bar">
                <button class="date-nav" id="calPrev" type="button" aria-label="이전 달">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="date-text" id="calLabel">—</span>
                <button class="date-nav" id="calNext" type="button" aria-label="다음 달">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <div class="seg" id="calToggle" role="group" aria-label="대장 종류">
                <button class="seg__btn seg__btn--active" data-type="stock" type="button">대장주</button>
                <button class="seg__btn" data-type="sector" type="button">대장 섹터</button>
                <button class="seg__btn" data-type="theme" type="button">대장 테마</button>
            </div>
        </div>

        <div class="loading" id="calLoading" style="display:none;">데이터 로딩 중...</div>
        <div class="message" id="calMessage" style="display:none;"></div>

        <section class="cal-grid" id="calGrid"></section>
        <div class="cal-foot">
            <section class="cal-legend" id="calLegend" style="display:none;"></section>
            <button class="cal-save" id="calSave" type="button" aria-label="캘린더 이미지 저장" title="캘린더 이미지 저장">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>이미지 저장</span>
            </button>
        </div>
    </main>

                </p>
                <p class="footer__copy">&copy; 2026 ORGO.</p>

    </div>
