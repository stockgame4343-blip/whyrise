    <style>
        .cal-page { padding-bottom: 60px; }
        .cal-head { margin: 18px 0 10px; }
        .cal-head__title { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
        .cal-head__title strong { color: var(--wr-accent); }
        .cal-head__desc { margin-top: 8px; font-size: 14px; color: var(--text-secondary); line-height: 1.55; }

        .cal-controls {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; flex-wrap: wrap; margin: 18px 0 14px;
        }
        .cal-month-nav { display: flex; align-items: center; gap: 10px; }
        .cal-month-nav__btn {
            width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-primary); font-size: 16px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, border-color .15s;
        }
        .cal-month-nav__btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--glass-border-strong); }
        .cal-month-nav__btn:disabled { opacity: .35; cursor: default; }
        .cal-month-nav__label { font-size: 17px; font-weight: 800; min-width: 116px; text-align: center; font-feature-settings: 'tnum'; }

        .cal-toggle { display: inline-flex; gap: 4px; padding: 4px; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .cal-toggle__btn {
            padding: 7px 14px; border-radius: 9px; cursor: pointer; border: 0; background: transparent;
            color: var(--text-secondary); font-size: 13px; font-weight: 700; transition: all .15s;
        }
        .cal-toggle__btn--active { background: var(--wr-accent); color: #fff; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-dow { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 4px 0; }
        .cal-dow--sun { color: #e0566a; }
        .cal-dow--sat { color: #4f8cff; }

        .cal-cell {
            position: relative; min-height: 92px; border-radius: 12px; padding: 8px 9px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            display: flex; flex-direction: column; gap: 4px; overflow: hidden;
            transition: transform .12s, box-shadow .12s;
        }
        .cal-cell--blank { background: transparent; border-color: transparent; }
        .cal-cell--empty { background: transparent; border-color: var(--glass-border); opacity: .4; }
        .cal-cell--data { cursor: default; border-left: 3px solid var(--lead, var(--glass-border)); }
        a.cal-cell--data { text-decoration: none; }
        .cal-cell--data:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.18); }
        .cal-cell--today { outline: 2px solid var(--wr-accent); outline-offset: -1px; }
        .cal-cell__tint { position: absolute; inset: 0; z-index: 0; }
        .cal-cell > * { position: relative; z-index: 1; }
        .cal-cell__date { font-size: 12px; font-weight: 700; color: var(--text-secondary); font-feature-settings: 'tnum'; }
        .cal-cell--today .cal-cell__date { color: var(--wr-accent); }
        .cal-cell__lead { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
        .cal-cell__name { font-size: 14px; font-weight: 800; color: var(--text-primary); letter-spacing: -.3px; line-height: 1.25;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cal-cell__rate { font-size: 12px; font-weight: 700; color: var(--rise); font-feature-settings: 'tnum'; }
        .cal-cell__sub { margin-top: auto; display: flex; flex-direction: column; gap: 1px; }
        .cal-cell__subitem { font-size: 10.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cal-cell__subitem b { color: var(--text-secondary); font-weight: 600; }
        .cal-cell__none { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .cal-legend { margin-top: 22px; }
        .cal-legend__head { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; }
        .cal-legend__items { display: flex; flex-wrap: wrap; gap: 8px; }
        .cal-legend__item { display: inline-flex; align-items: center; gap: 7px; padding: 6px 11px; border-radius: 999px;
            border: 1px solid var(--glass-border); font-size: 12.5px; font-weight: 700; color: var(--text-primary); }
        .cal-legend__dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
        .cal-legend__count { color: var(--text-muted); font-weight: 600; }

        @media (max-width: 640px) {
            .cal-grid { gap: 4px; }
            .cal-cell { min-height: 78px; padding: 6px 6px; border-radius: 10px; }
            .cal-cell__name { font-size: 12px; }
            .cal-cell__subitem { display: none; }
            .cal-head__title { font-size: 22px; }
        }
    </style>
</head>
<body>

            <h1 class="cal-head__title">오늘의 <strong>대장</strong> 캘린더</h1>
            <p class="cal-head__desc">날짜마다 그날의 대장주·대장 섹터·대장 테마를 모았습니다. 같은 대장은 같은 색으로 깔려, 한 달 동안 누가 시장을 끌었는지 한눈에 보입니다.</p>

                <button class="cal-month-nav__btn" id="calNext" type="button" aria-label="다음 달">›</button>

            <div class="cal-toggle" id="calToggle" role="tablist">

                <button class="cal-toggle__btn" data-type="theme" type="button">대장 테마</button>
            </div>
        </div>

        <div class="loading" id="calLoading" style="display:none;">데이터 로딩 중...</div>
        <div class="message" id="calMessage" style="display:none;"></div>
