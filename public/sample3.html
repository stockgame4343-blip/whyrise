<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ORGO">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <title>대장 캘린더 (샘플3) - ORGO</title>
    <meta name="description" content="날짜별 대장주·대장 섹터·대장 테마를 캘린더 + 상세 패널로. 거래일 기준, 반복 대장은 같은 색.">
    <meta name="theme-color" content="#0a0b0f">
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/whyrise.css?v=20260616i">
    <style>
        .c3-page { padding-bottom: 60px; }
        .c3-head { align-items: flex-start; }
        .c3-sub { margin: 6px 0 0; font-size: 13px; font-weight: 500; color: var(--text-muted); line-height: 1.5; }
        .c3-sub b { color: var(--text-secondary); font-weight: 700; }
        .c3-controls { display: flex; justify-content: flex-start; margin: 10px 0 14px; }

        /* 캘린더 + 상세 패널 2단 (데스크톱) */
        .c3-layout { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }
        .c3-grid-wrap { min-width: 0; }

        .c3-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .c3-dow { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 4px 0; }

        .c3-cell {
            min-height: 96px; border-radius: 14px; padding: 8px 9px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            display: flex; flex-direction: column; gap: 3px;
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }
        .c3-cell--blank { background: transparent; border-color: transparent; }
        .c3-cell--empty { background: transparent; }
        .c3-cell--holiday, .c3-cell--future { opacity: .55; }
        .c3-cell--data { cursor: pointer; }
        .c3-cell--data:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.16); border-color: var(--glass-border-strong); }
        .c3-cell--selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
        .c3-cell--lit { box-shadow: 0 0 0 2px var(--lit) inset; border-color: var(--lit); }
        .c3-cell--dim { opacity: .38; }

        .c3-cell__top { display: flex; align-items: center; justify-content: space-between; gap: 4px; min-height: 16px; }
        .c3-cell__date { font-size: 12px; font-weight: 700; color: var(--text-secondary); font-feature-settings: 'tnum'; }
        .c3-badge { font-size: 10px; font-weight: 800; line-height: 1; padding: 2px 5px; border-radius: 999px;
            border: 1px solid var(--glass-border); color: var(--text-secondary); }

        .c3-cell__name { display: flex; align-items: center; gap: 5px; font-size: 13.5px; font-weight: 800; color: var(--text-primary);
            letter-spacing: -.3px; line-height: 1.2; min-width: 0; }
        .c3-cell__name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .c3-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .c3-cell__rate { font-size: 12px; font-weight: 800; color: var(--rise); font-feature-settings: 'tnum'; }

        .c3-cell__center { flex: 1; display: flex; align-items: center; justify-content: center; }
        .c3-cell__off { font-size: 11px; color: var(--text-muted); }
        .c3-cell__none { font-size: 12px; color: var(--text-muted); }

        /* 상세 패널 (데스크톱 우측, sticky) */
        .c3-panel { position: sticky; top: 78px; border: 1px solid var(--glass-border); border-radius: 16px;
            background: var(--glass-bg); overflow: hidden; }
        .c3-panel__head { padding: 12px 16px; font-size: 13px; font-weight: 800; color: var(--text-secondary);
            border-bottom: 1px solid var(--glass-border); }
        .c3-panel__body { padding: 14px 16px; }
        .c3-det__placeholder { font-size: 13px; color: var(--text-muted); line-height: 1.6; padding: 8px 0; }
        .c3-det__date { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 12px; }
        .c3-det__secs { display: flex; flex-direction: column; gap: 12px; }
        .c3-det__sec { }
        .c3-det__label { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: .3px; margin-bottom: 5px; }
        .c3-det__lead { display: block; border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 12px; background: var(--glass-bg); }
        a.c3-det__lead--link { text-decoration: none; transition: border-color .12s, background .12s; }
        a.c3-det__lead--link:hover { border-color: var(--accent); }
        .c3-det__name { display: flex; align-items: center; font-size: 15px; font-weight: 800; color: var(--text-primary); }
        .c3-chev { margin-left: auto; color: var(--accent); font-weight: 800; font-size: 18px; line-height: 1; }
        .c3-det__metric { margin-top: 3px; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); font-feature-settings: 'tnum'; }
        .c3-det__metric b { color: var(--rise); font-weight: 800; }
        .c3-det__reason { margin-top: 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); line-height: 1.4; }
        .c3-det__empty { font-size: 12px; color: var(--text-muted); }

        /* 범례 (클릭 시 해당 대장 칸 강조) */
        .c3-legend { margin-top: 18px; }
        .c3-legend__head { font-size: 14px; font-weight: 800; color: var(--text-primary); margin-bottom: 10px; }
        .c3-legend__hint { font-size: 12px; font-weight: 500; color: var(--text-muted); }
        .c3-legend__items { display: flex; flex-wrap: wrap; gap: 8px; }
        .c3-legend__item { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 999px;
            border: 1px solid var(--glass-border); background: transparent; font-family: inherit; font-size: 13px; font-weight: 700;
            color: var(--text-primary); cursor: pointer; transition: background .15s, border-color .15s; }
        .c3-legend__item:hover { border-color: var(--glass-border-strong); }
        .c3-legend__dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
        .c3-legend__count { color: var(--text-secondary); font-weight: 600; }

        /* 모바일 바텀시트 */
        .c3-sheet { position: fixed; inset: 0; z-index: 1200; display: none; }
        .c3-sheet--open { display: block; }
        .c3-sheet__backdrop { position: absolute; inset: 0; background: var(--modal-backdrop); }
        .c3-sheet__panel { position: absolute; left: 0; right: 0; bottom: 0; max-height: 78vh; overflow-y: auto;
            background: var(--bg-secondary); border-radius: 20px 20px 0 0; padding: 8px 18px calc(20px + env(safe-area-inset-bottom));
            box-shadow: var(--modal-shadow); animation: c3SheetUp .22s ease; }
        @keyframes c3SheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .c3-sheet__handle { width: 40px; height: 4px; border-radius: 999px; background: var(--text-muted); opacity: .4; margin: 4px auto 12px; }
        .c3-sheet__close { position: absolute; top: 10px; right: 14px; width: 30px; height: 30px; border: 0; border-radius: 50%;
            background: var(--bg-tertiary); color: var(--text-secondary); font-size: 20px; line-height: 1; cursor: pointer; }
        .c3-noscroll { overflow: hidden; }

        @media (max-width: 860px) {
            .c3-layout { grid-template-columns: 1fr; }
            .c3-panel { display: none; }            /* 데스크톱 패널 숨김 → 바텀시트 사용 */
            .c3-controls { justify-content: stretch; }
            .c3-controls .seg { flex: 1 1 100%; justify-content: center; }
            .c3-controls .seg__btn { flex: 1; padding: 7px 4px; }
            .c3-grid { gap: 4px; }
            .c3-cell { min-height: 74px; padding: 6px 6px; border-radius: 11px; }
            .c3-cell__name { font-size: 12px; }
            .c3-cell__rate { font-size: 11px; }
        }
    </style>
</head>
