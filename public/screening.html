<body>

    (function(){
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
    </script>

    <header class="top-bar">
        <div class="top-bar__inner frame">
            <a class="top-bar__logo" href="/" aria-label="ORNO 홈">
                <svg class="top-bar__logo-svg" viewBox="0 0 96 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <text x="0" y="29" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="30" font-weight="900" fill="currentColor" letter-spacing="-1.5">ORNO</text>

                <a href="/leaders2.html" class="top-bar__link">시각화</a>
                <a href="/screening.html" class="top-bar__link top-bar__link--active">스크리닝</a>
            </nav>
            <div class="top-bar__right">
                <button class="top-bar__hamburger" id="navToggle" type="button" aria-label="메뉴" aria-expanded="false">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="frame screening-page">
        <header class="screening-head">
            <div>
                <h1 class="screening-title">스크리닝</h1>
            </div>
            <div class="screening-total" id="screeningTotal">-</div>
        </header>

        <section class="screening-controls glass" aria-label="스크리닝 필터">
            <div class="screening-search">
                <input class="screening-input" id="screeningSearch" type="search" placeholder="종목명·코드·섹터·테마·이유 검색" autocomplete="off" spellcheck="false">
                <button class="screening-watch-btn" id="screeningWatchBtn" type="button" aria-pressed="false">관심</button>
                <button class="screening-reset" id="screeningReset" type="button">초기화</button>
            </div>
            <div class="screening-filter-grid">
                <label class="screening-field">
                    <span>조건</span>
                    <select id="screeningCountKey">
                        <option value="count_10">+10% 이상</option>
                        <option value="count_15">+15% 이상</option>
                        <option value="count_20">+20% 이상</option>
                        <option value="count_limit">상한가</option>
                        <option value="count_recent">최근 30일</option>
                    </select>
                </label>
                <label class="screening-field">
                    <span>횟수</span>
                    <select id="screeningMinCount">
                        <option value="1">1회 이상</option>
                        <option value="2">2회 이상</option>
                        <option value="3">3회 이상</option>
                        <option value="4">4회 이상</option>
                        <option value="5">5회 이상</option>
                        <option value="6">6회 이상</option>
                        <option value="7">7회 이상</option>
                        <option value="8">8회 이상</option>
                        <option value="9">9회 이상</option>
                        <option value="10">10회 이상</option>
                    </select>
                </label>
                <label class="screening-field">
                    <span>시장</span>
                    <select id="screeningMarket">
                        <option value="">전체</option>
                        <option value="KOSPI">KOSPI</option>
                        <option value="KOSDAQ">KOSDAQ</option>
                    </select>
                </label>
                <label class="screening-field">
                    <span>섹터</span>
                    <select id="screeningSector">
                        <option value="">전체 섹터</option>
                    </select>
                </label>
                <label class="screening-field screening-field--wide">
                    <span>테마</span>
                    <select id="screeningTheme">
                        <option value="">전체 테마</option>
                    </select>
                </label>
                <label class="screening-field">
                    <span>시총</span>
                    <select id="screeningMcap">
                        <option value="">전체</option>
                        <option value="under_1000">1천억 미만</option>
                        <option value="1000_10000">1천억~1조</option>
                        <option value="10000_100000">1조~10조</option>
                        <option value="over_100000">10조 이상</option>
                        <option value="unknown">미집계</option>
                    </select>
                </label>
                <label class="screening-field">
                    <span>정렬</span>
                    <select id="screeningSort">
                        <option value="count_10">+10% 횟수순</option>
                        <option value="count_15">+15% 횟수순</option>
                        <option value="count_20">+20% 횟수순</option>
                        <option value="count_limit">상한가 횟수순</option>
                        <option value="count_recent">최근 30일 횟수순</option>
                        <option value="market_cap">시총순</option>
                        <option value="avg_rate">평균 상승률순</option>
                        <option value="latest_date">최근 발생일순</option>
                        <option value="name">종목명순</option>
                    </select>
                </label>
            </div>
        </section>

        <div class="message" id="screeningMessage" style="display:none;"></div>
        <div class="loading" id="screeningLoading" style="display:block;">스크리닝 데이터 로딩 중...</div>

        <div class="table-wrap glass screening-table-wrap">
            <table class="ranking-table whyrise-table screening-table" id="screeningTable">
                <thead>
                    <tr>
                        <th class="col-rank">#</th>
                        <th class="col-name">종목명</th>
                        <th class="col-reason col-reason--hero">왜 오름?</th>
                        <th class="col-counts">횟수</th>
                        <th class="col-change">최근 상승</th>
                        <th class="col-cap">시가총액</th>
                        <th class="col-sector">섹터</th>
                    </tr>
                </thead>
                <tbody id="screeningBody"></tbody>
            </table>
        </div>
        <div class="screening-list-meta" id="screeningUpdatedAt"></div>
    </main>

    <div class="footer">
        <footer class="footer__wrap">
            <div class="frame footer__inner">
                <div class="visitor-row" id="visitorRow" style="display:none;">
                    <span class="visitor-row__dot"></span>
                    <span><span class="visitor-row__num" id="visitorOnline">-</span>명 보는 중</span>
                    <span class="visitor-row__sep">·</span>
                    <span>누적 <span class="visitor-row__num" id="visitorUnique">-</span>명</span>
                </div>
                <p class="footer__disclaimer">
                    <strong>본 사이트는 투자자문·종목 추천·매수/매도 권유를 제공하지 않습니다.</strong><br>
                    스크리닝 결과는 과거 급등 이력 데이터의 기계적 분류이며, 미래 수익이나 투자 판단을 보장하지 않습니다.
                </p>
                <p class="footer__copy">&copy; 2026 ORNO. 비영리 개인 프로젝트. <a href="/admin.html" class="footer__admin-link">·</a></p>
            </div>
        </footer>
    </div>

    <div class="modal-overlay" id="memoModal" style="display:none;">
        <div class="modal">
            <div class="modal__header">
                <h3 class="modal__title" id="memoModalTitle">메모</h3>
                <button class="modal__close" id="memoModalClose">&times;</button>
            </div>
            <div class="modal__body">
                <textarea class="memo-textarea" id="memoTextarea" placeholder="이 종목에 대한 메모를 작성하세요..."></textarea>
                <div class="memo-actions">
                    <button class="memo-delete" id="memoDelete">삭제</button>
                    <button class="memo-save" id="memoSave">저장</button>
                </div>
            </div>
        </div>
    </div>
