name: 장전 브리핑 텔레그램 자동 게시

# 평일 아침, 간밤 미국 마감 + 전 거래일 국내 복기를 텍스트로 채널 게시.
#   - 데이터: Yahoo chart API(해외) + stock-rise raw(국내 복기) — 이미지·Chromium 불필요
# 중복 게시는 public/data/_telegram-morning.json 마커로 방지.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '전송 안 하고 캡션만 산출(검증)'
        type: boolean
        default: false
      force:
        description: '마커·주말 게이트 무시하고 강제 게시'
        type: boolean
        default: false
  repository_dispatch:
    types: [tg-morning]      # 외부 cron-job.org → GitHub dispatch (GitHub 크론 누락 대비 이중화)
  schedule:
    - cron: '30 23 * * 0-4'   # 평일 KST 08:30 — 미국 마감(05~06시) 후, 개장 전
    - cron: '0 0 * * 1-5'     # 평일 KST 09:00 — 백업(첫 크론 누락 대비, 마커로 중복 방지)

env:
  TZ: Asia/Seoul

concurrency:
  group: telegram-morning
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          node scripts/telegram_morning_brief.js $ARGS

      # 중복 방지 마커 커밋(게시됐을 때만 변경됨). dry-run/스킵이면 변경 없음 → no-op.
      - name: Commit marker
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/_telegram-morning.json 2>/dev/null || true
          git diff --staged --quiet && echo "게시 안 됨/변경 없음 — 커밋 스킵" && exit 0
          git commit -m "chore: 장전 브리핑 게시 마커 ($(date +%Y%m%d))"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            if git -c rebase.autoStash=true rebase "origin/$BRANCH"; then
              git push origin "HEAD:$BRANCH" && echo "마커 push 성공" && exit 0
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "마커 push 실패(비치명적) — 다음 실행이 마커 없이도 스킵 로직 재확인" && exit 0
