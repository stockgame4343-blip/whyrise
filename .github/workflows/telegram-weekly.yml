name: 주간 리포트 텔레그램 자동 게시

# 그 주 '마지막 거래일' 장마감 후(KST 15:55), 이번 주 주도 섹터·테마 TOP5 + 일별 대장 카드를 whyorgo 채널에 게시.
#   - 데이터: report-summary.json(w1) + leaders-calendar.json (레포 커밋본)
# '주 마지막 거래일' 판정: scripts/is_last_trading_day.py week (KRX 공휴일 반영).
#   보통 금요일이지만 금요일이 공휴일이면 목요일에 발행 → 장 안 열리는 날엔 안 나감.
#   크론은 목·금에만 발사, 스크립트가 주 마지막 거래일만 통과. 주 단위 마커로 중복 방지.
# 시크릿(TELEGRAM_BOT_TOKEN) 미설정이면 no-op.

on:
  workflow_dispatch:
    inputs:
      dry_run: { description: '전송 안 함(검증)', type: boolean, default: false }
      force: { description: '주마지막거래일/마커 무시 강제', type: boolean, default: false }
  repository_dispatch:
    types: [tg-weekly]        # 외부 cron-job.org → GitHub dispatch (게이트가 주 마지막거래일만 통과)
  schedule:
    - cron: '55 6 * * 4,5'   # 목·금 KST 15:55 — 마감 25분 후 (금 공휴일 대비 목 포함)
    - cron: '25 7 * * 4,5'   # 목·금 KST 16:25 — 백업(마커로 중복 방지)

env:
  TZ: Asia/Seoul

concurrency:
  group: telegram-weekly
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      # 게이트: dry_run 무조건 / force+토큰 강제 / 그 외엔 토큰+'주 마지막 거래일'일 때만
      - name: Week-end gate
        id: gate
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          RUN=false
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            RUN=true
          elif [ -n "$TG_TOKEN" ]; then
            if [ "${{ inputs.force }}" = "true" ]; then
              RUN=true
            elif python3 scripts/is_last_trading_day.py week; then
              RUN=true
            fi
          fi
          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "게이트: run=$RUN (token=$([ -n "$TG_TOKEN" ] && echo set || echo none))"

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Cache Playwright browsers
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1

      - name: Install Playwright
        if: steps.gate.outputs.run == 'true'
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.56.1 --no-save
          npx playwright install --with-deps chromium

      - name: Post to Telegram (weekly)
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          node scripts/telegram_weekly.js $ARGS

      - name: Upload image artifact
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: telegram-weekly-image
          path: telegram-weekly.png
          if-no-files-found: ignore

      - name: Commit marker
        if: steps.gate.outputs.run == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f telegram-weekly.png
          git add public/data/_telegram-weekly-posted.json 2>/dev/null || true
          git diff --staged --quiet && echo "게시 안 됨/변경 없음 — 커밋 스킵" && exit 0
          git commit -m "chore: 주간 리포트 텔레그램 게시 마커 ($(date +%Y%m%d))"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            if git -c rebase.autoStash=true rebase "origin/$BRANCH"; then
              git push origin "HEAD:$BRANCH" && echo "마커 push 성공" && exit 0
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "마커 push 실패(비치명적)" && exit 0
