name: 오늘의 대장 텔레그램 자동 게시

# 매일 장 마감후, '오늘의 대장' 정사각 이미지 + 캡션을 텔레그램 채널에 자동 게시.
#   - 대장 계산은 build_leaders_calendar.js 로직 재사용(사이트와 동일)
#   - 이미지: 홈 리포트 카드 캡쳐(headless Chromium)
#   - 캡션 마지막 멘트: Claude API(선택). 미설정 시 템플릿.
# 중복 게시는 public/data/_telegram-posted.json 마커로 방지(크론 이중 발동 안전).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '전송 안 하고 이미지+캡션만 산출(검증)'
        type: boolean
        default: false
      force:
        description: '마커 무시하고 강제 게시'
        type: boolean
        default: false
      date:
        description: '샘플용 과거 날짜 YYYYMMDD (비우면 오늘)'
        type: string
        default: ''
  repository_dispatch:
    types: [tg-daily]        # 외부 cron-job.org → GitHub dispatch (GitHub 크론 누락 대비 이중화)
  schedule:
    - cron: '45 6 * * 1-5'   # 평일 KST 15:45 — 마감 15분 후(종가 안정)
    - cron: '15 7 * * 1-5'   # 평일 KST 16:15 — 백업(첫 크론 누락 대비, 마커로 중복 방지)

env:
  TZ: Asia/Seoul

concurrency:
  group: telegram-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Playwright(Chromium) — 브라우저 캐시로 재실행 단축
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.56.1 --no-save
          npx playwright install --with-deps chromium

      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          [ -n "${{ inputs.date }}" ] && ARGS="$ARGS --date=${{ inputs.date }}"
          node scripts/telegram_daily_leader.js $ARGS

      # 검증용 — 렌더된 이미지를 아티팩트로 업로드(dry-run 확인)
      - name: Upload image artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-daily-image
          path: telegram-daily*.png
          if-no-files-found: ignore

      # 중복 방지 마커 커밋(게시됐을 때만 변경됨). dry-run/스킵이면 변경 없음 → no-op.
      - name: Commit marker
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f telegram-daily*.png
          git add public/data/_telegram-posted.json 2>/dev/null || true
          git diff --staged --quiet && echo "게시 안 됨/변경 없음 — 커밋 스킵" && exit 0
          git commit -m "chore: 텔레그램 게시 마커 ($(date +%Y%m%d))"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            if git -c rebase.autoStash=true rebase "origin/$BRANCH"; then
              git push origin "HEAD:$BRANCH" && echo "마커 push 성공" && exit 0
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "마커 push 실패(비치명적) — 다음 실행이 마커 없이도 스킵 로직 재확인" && exit 0
