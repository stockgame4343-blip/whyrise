name: 월간 리포트 텔레그램 자동 게시

# 매월 첫 거래일 아침(KST 09:35), 최근 한 달 주도 섹터·테마 TOP5 + 단골 급등주 카드를 whyorgo 채널에 게시.
#   - 데이터: report-summary.json(m1) (빌드 산출물, 레포 커밋본 사용)
#   - 이미지: 자체 HTML 카드 1장(헤드리스 Chromium)
# '첫 거래일' 판정은 스크립트가 dates.json 으로 수행 → 크론은 매월 1~4일에만 발사(대부분 no-op).
#   (cron 은 day-of-month 와 day-of-week 를 함께 좁히면 OR 로 동작하므로 요일 필터는 넣지 않고 스크립트가 판정)
# 월 단위 마커로 중복 방지. 시크릿(TELEGRAM_BOT_TOKEN) 미설정이면 no-op.

on:
  workflow_dispatch:
    inputs:
      dry_run: { description: '전송 안 함(검증)', type: boolean, default: false }
      force: { description: '첫거래일/마커 무시 강제', type: boolean, default: false }
  schedule:
    - cron: '35 0 1-4 * *'   # 매월 1~4일 KST 09:35 — 스크립트가 첫 거래일만 통과
    - cron: '50 0 1-4 * *'   # 백업 KST 09:50 (마커로 중복 방지)

env:
  TZ: Asia/Seoul

concurrency:
  group: telegram-monthly
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Secret gate
        id: gate
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          RUN=false
          if [ -n "$TG_TOKEN" ] || [ "${{ inputs.dry_run }}" = "true" ]; then RUN=true; fi
          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "게이트: run=$RUN (token=$([ -n "$TG_TOKEN" ] && echo set || echo none))"

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Cache Playwright browsers
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1

      - name: Install Playwright
        if: steps.gate.outputs.run == 'true'
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.56.1 --no-save
          npx playwright install --with-deps chromium

      - name: Post to Telegram (monthly)
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          node scripts/telegram_monthly.js $ARGS

      - name: Upload image artifact
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: telegram-monthly-image
          path: telegram-monthly.png
          if-no-files-found: ignore

      - name: Commit marker
        if: steps.gate.outputs.run == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f telegram-monthly.png
          git add public/data/_telegram-monthly-posted.json 2>/dev/null || true
          git diff --staged --quiet && echo "게시 안 됨/변경 없음 — 커밋 스킵" && exit 0
          git commit -m "chore: 월간 리포트 텔레그램 게시 마커 ($(date +%Y%m))"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            if git -c rebase.autoStash=true rebase "origin/$BRANCH"; then
              git push origin "HEAD:$BRANCH" && echo "마커 push 성공" && exit 0
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "마커 push 실패(비치명적)" && exit 0
