name: 종목 인덱스 빌드 (1년치)

# 평일 KST 매시 :10 (UTC 00:10~07:10) — marketmap-only 장중 갱신 (OHLC 캐시 hit 으로 가벼움)
# 평일 KST 15:40 (UTC 06:40) — incremental (장 마감 직후 stock-history + marketmap)
# 일요일 KST 06:00 (UTC 21:00 토) — full rebuild
on:
  schedule:
    - cron: '10 0,1,2,3,4,5,7 * * 1-5'  # 평일 KST 09:10/10:10/.../14:10/16:10 — marketmap-only
    - cron: '10 6 * * 1-5'              # 평일 KST 15:10 — marketmap-only (장 마감 20분 전)
    - cron: '40 6 * * 1-5'              # 평일 KST 15:40 — incremental (장 마감 직후)
    - cron: '0 21 * * 6'                # 일요일 KST 06:00 = 토요일 UTC 21:00 full
  workflow_dispatch:
    inputs:
      mode:
        description: 'full | incremental | estimate-only | marketmap-only'
        required: false
        default: 'incremental'
        type: choice
        options: [full, incremental, estimate-only, marketmap-only]
      days:
        description: '풀빌드 기간 (full mode)'
        required: false
        default: '365'
      cutoff:
        description: '컷오프 % (인덱스 저장 최저)'
        required: false
        default: '10'
      limit:
        description: 'estimate-only 처리 한도'
        required: false
        default: '500'
      backfill_days:
        description: 'marketmap-only 백필 영업일 수 (0 = 백필 없음, 252 = 1년)'
        required: false
        default: '0'
  repository_dispatch:
    types: [rebuild-history, override-saved]

env:
  TZ: Asia/Seoul

concurrency:
  group: build-history
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 350      # 풀빌드 ~3시간 여유

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # OHLC 디스크 캐시 — 백필이 중간 실패해도 다음 실행은 즉시 hit.
      # save-always: true 로 job 실패해도 캐시 저장.
      - name: Restore OHLC cache
        uses: actions/cache@v4
        with:
          path: public/data/_cache/ohlc
          key: ohlc-cache-v1-${{ github.run_id }}
          restore-keys: |
            ohlc-cache-v1-
          save-always: true

      - name: Install dependencies
        run: |
          # 표준 라이브러리만 사용 — 외부 패키지 불필요 (urllib, json, etc.)
          # 향후 BeautifulSoup·requests 가 필요하면 여기서 install
          python --version

      - name: Determine mode
        id: mode
        run: |
          EVENT="${{ github.event_name }}"
          INPUT_MODE="${{ inputs.mode }}"
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          elif [ "$EVENT" = "schedule" ]; then
            HOUR_UTC=$(date -u +%H)
            MIN_UTC=$(date -u +%M)
            DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
            # 토요일 21:00 UTC = 일요일 06:00 KST → full
            if [ "$HOUR_UTC" = "21" ] && [ "$DOW" = "6" ]; then
              MODE="full"
            elif [ "$HOUR_UTC" = "6" ] && [ "$MIN_UTC" -ge "30" ]; then
              # 평일 KST 15:40 (UTC 06:40) — 장 마감 직후 incremental
              MODE="incremental"
            else
              # 평일 매시 :10 — 가벼운 marketmap-only (장중 데이터 갱신)
              MODE="marketmap-only"
            fi
          elif [ "$EVENT" = "repository_dispatch" ]; then
            MODE="estimate-only"
          else
            MODE="incremental"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "결정 모드: $MODE (event=$EVENT)"

      - name: Holiday gate
        id: gate
        run: |
          TODAY=$(date +%Y%m%d)
          MODE="${{ steps.mode.outputs.mode }}"
          # full / estimate-only 는 평일/주말 무관
          if [ "$MODE" = "incremental" ]; then
            DOW=$(date +%u)
            if [ $DOW -ge 6 ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "주말 — incremental 스킵"
              exit 0
            fi
            # 한국 공휴일 스킵
            python3 -c "
          import sys
          sys.path.insert(0, '.')
          from collector.kr_holidays import is_kr_holiday
          import datetime
          if is_kr_holiday(datetime.date.today()):
            sys.exit(1)
          " || (echo "한국 공휴일 — 스킵" && echo "skip=true" >> $GITHUB_OUTPUT && exit 0)
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run build
        if: steps.gate.outputs.skip != 'true'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DAYS="${{ inputs.days }}"
          CUTOFF="${{ inputs.cutoff }}"
          LIMIT="${{ inputs.limit }}"
          BACKFILL="${{ inputs.backfill_days }}"
          [ -z "$DAYS" ] && DAYS=365
          [ -z "$CUTOFF" ] && CUTOFF=10
          [ -z "$LIMIT" ] && LIMIT=500
          [ -z "$BACKFILL" ] && BACKFILL=0
          echo "=== $MODE (days=$DAYS cutoff=$CUTOFF limit=$LIMIT backfill=$BACKFILL) ==="
          set -e
          if [ "$MODE" = "full" ]; then
            python3 scripts/build-history.py --days "$DAYS" --cutoff "$CUTOFF"
          elif [ "$MODE" = "estimate-only" ]; then
            python3 scripts/build-history.py --estimate-only --limit "$LIMIT"
          elif [ "$MODE" = "marketmap-only" ]; then
            if [ "$BACKFILL" -gt 0 ]; then
              python3 scripts/build-history.py --marketmap-only --backfill-days "$BACKFILL"
            else
              python3 scripts/build-history.py --marketmap-only
            fi
          else
            # incremental — 짧은 기간만 fetch + 머지
            python3 scripts/build-history.py --days 30 --cutoff "$CUTOFF"
          fi

      - name: Diff guard (full only)
        if: steps.gate.outputs.skip != 'true' && steps.mode.outputs.mode == 'full'
        run: |
          # 풀빌드가 50% 이상 파일 다 새로 쓰면 의심 (덮어쓰기 사고 방지)
          CHANGED=$(git diff --name-only public/data/stock-history/ | wc -l)
          TOTAL=$(ls public/data/stock-history/*.json 2>/dev/null | wc -l)
          [ "$TOTAL" = "0" ] && TOTAL=1
          PERCENT=$((CHANGED * 100 / TOTAL))
          echo "변경 $CHANGED / $TOTAL = $PERCENT%"
          if [ "$PERCENT" -gt 80 ] && [ "$TOTAL" -gt 100 ]; then
            echo "::warning::풀빌드 변경률 $PERCENT% — 덮어쓰기 사고 의심"
          fi

      # 빌드 산출물을 artifact 로 먼저 보관 — push 실패해도 90일간 다운로드 가능
      - name: Upload build artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_id }}
          path: |
            public/data/report-summary.json
            public/data/stock-history/
            public/sitemap.xml
          retention-days: 90
          if-no-files-found: warn

      - name: Commit & push
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 빌드 산출물 stage (public/data/)
          git add public/data/
          # 추가 unstaged 변경 (예: pip cache·기타) 도 stage 또는 버림
          git checkout -- . || true   # 추적 중인 다른 파일 변경 복원
          git clean -fd -e 'public/data/_cache' || true  # 추적 안 되는 파일 제거 (cache 디렉토리는 보존)
          git diff --staged --quiet && echo "변경 없음" && exit 0
          git commit -m "build: 인덱스+버블+리포트 갱신 ($(date +%Y%m%d))"
          # push 시 origin 변경 있으면 autostash rebase 후 retry (최대 3회)
          for attempt in 1 2 3; do
            git fetch origin master
            if git -c rebase.autoStash=true rebase origin/master; then
              if git push; then
                echo "push 성공 (시도 $attempt)"
                exit 0
              fi
            else
              echo "rebase 충돌 — abort 후 재시도"
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "::error::push 3회 실패"
          exit 1
