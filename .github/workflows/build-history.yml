name: 종목 인덱스 빌드 (1년치)

# 평일 KST 매 15분 (09:07/09:22/.../15:22) — marketmap-intraday 빠른 갱신.
#   GitHub cron 만성 누락(하루 3회 수준 실행) 보완 2중화:
#   ① cron 분을 :10/:40 → 비혼잡 분(:7/:22/:37/:52)으로 이동 + 15분 그리드로 트리거 포인트 2배
#   ② stock-rise cron-trigger(외부 cron-job.org, 신뢰성 높음)가 repository_dispatch
#      'marketmap-intraday' 를 같은 그리드로 발사 — 둘 중 먼저 온 쪽이 실행 (concurrency 코얼레싱)
# 평일 KST 15:40 (UTC 06:40) — incremental (장 마감 직후 stock-history + marketmap)
# 일요일 KST 06:00 (UTC 21:00 토) — full rebuild
# 모드 판정은 "트리거한 cron 문자열" 기준 (github.event.schedule) — GitHub cron 지연·누락에 안전.
# 보강: 마감 후 intraday 런이 build-meta.json 대비 업스트림이 앞서 있으면 incremental 자동 승격.
on:
  schedule:
    - cron: '7,22,37,52 0,1,2,3,4,5 * * 1-5'  # 평일 KST 09:07~14:52 — 15분 주기 (비혼잡 분)
    - cron: '7,22 6 * * 1-5'             # 평일 KST 15:07/15:22 — 마감 직전 구간
    - cron: '40 6 * * 1-5'               # 평일 KST 15:40 — incremental (장 마감 직후)
    - cron: '10 7 * * 1-5'               # 평일 KST 16:10 — 정정 종가
    - cron: '0 21 * * 6'                 # 일요일 KST 06:00 = 토요일 UTC 21:00 full
  workflow_dispatch:
    inputs:
      mode:
        description: 'full | incremental | estimate-only | enrich-meta | enrich-news | enrich-ohlc | marketmap-only | marketmap-intraday'
        required: false
        default: 'incremental'
        type: choice
        options: [full, incremental, estimate-only, enrich-meta, enrich-news, enrich-ohlc, marketmap-only, marketmap-intraday, llm-refine-dry, llm-refine]
      date:
        description: 'llm-refine(-dry) 대상 일자 YYYYMMDD (빈값 = rise-history 최신)'
        required: false
        default: ''
      days:
        description: '풀빌드 기간 (full mode)'
        required: false
        default: '365'
      cutoff:
        description: '컷오프 % (인덱스 저장 최저)'
        required: false
        default: '10'
      limit:
        description: 'estimate-only 처리 한도'
        required: false
        default: '500'
      backfill_days:
        description: 'marketmap-only 백필 영업일 수 (0 = 백필 없음, 252 = 1년)'
        required: false
        default: '0'
  repository_dispatch:
    types: [rebuild-history, override-saved, marketmap-intraday, incremental-build]

env:
  TZ: Asia/Seoul

# concurrency 는 job 단위 — build(전역 직렬) / override-sync(종목별 직렬, 종목 간 병렬).
# 한 그룹에 running 1 + pending 1 만 유지되고 새 dispatch 가 pending 을 교체하므로,
# 서로 다른 종목의 admin 저장이 같은 그룹에서 서로를 밀어내지 않게 그룹을 분리한다.

jobs:
  build:
    # override-saved + ticker payload 는 아래 override-sync job 전담 — 여기서 제외.
    # (payload 없는 구버전 override-saved / rebuild-history 는 기존대로 estimate-only 흡수)
    if: ${{ !(github.event_name == 'repository_dispatch' && github.event.action == 'override-saved' && github.event.client_payload.ticker != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 350      # 풀빌드 ~3시간 여유
    concurrency:
      group: build-history
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # 표준 라이브러리만 사용 — 외부 패키지 불필요 (urllib, json, etc.)
          # 향후 BeautifulSoup·requests 가 필요하면 여기서 install
          python --version

      - name: Determine mode
        id: mode
        run: |
          EVENT="${{ github.event_name }}"
          INPUT_MODE="${{ inputs.mode }}"
          ESCALATED="false"
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          elif [ "$EVENT" = "schedule" ]; then
            # 실행 시각이 아니라 "어떤 cron 이 트리거했는가" 로 판정 —
            # GitHub cron 은 1~3시간 지연·누락이 일상이라 벽시계 판정은
            # incremental/full 을 전부 marketmap-intraday 로 오판정했음 (5/24~6/9 stock-history 동결 원인).
            SCHED="${{ github.event.schedule }}"
            case "$SCHED" in
              '0 21 * * 6')   MODE="full" ;;          # 일요일 KST 06:00 풀빌드
              '40 6 * * 1-5') MODE="incremental" ;;   # 평일 KST 15:40 장마감 incremental
              *)              MODE="marketmap-intraday" ;;
            esac
          elif [ "$EVENT" = "repository_dispatch" ]; then
            # stock-rise cron-trigger(외부 cron-job.org)의 cross-repo dispatch — type 으로 분기.
            # override-saved + ticker payload 는 job 조건에서 override-sync job 으로 빠진다.
            if [ "${{ github.event.action }}" = "marketmap-intraday" ]; then
              MODE="marketmap-intraday"
            elif [ "${{ github.event.action }}" = "incremental-build" ]; then
              MODE="incremental"     # 외부 cron-job.org 마감후 데이터 빌드 트리거(이중화)
            else
              MODE="estimate-only"   # payload 없는 구버전 override-saved / rebuild-history
            fi
          else
            MODE="incremental"
          fi
          # 누락 보정: cron/외부 디스패치 어느 경로로 왔든, 마감 후(KST 15:40+) intraday 런이
          # 업스트림 stock-rise 대비 stale 이면 incremental 로 승격 (1일 1회만 발동 — 승격 빌드가 meta 를 갱신).
          # GitHub cron 이 통째로 죽은 날도 외부 디스패치가 이 경로로 stock-history 를 살린다.
          if [ "$MODE" = "marketmap-intraday" ]; then
            NOW_MIN=$((10#$(date +%H) * 60 + 10#$(date +%M)))   # TZ=Asia/Seoul
            if [ "$NOW_MIN" -ge 940 ]; then
              LOCAL=$(python3 -c "import json;print(json.load(open('public/data/build-meta.json')).get('latest_stockrise_date',''))" 2>/dev/null || echo '')
              UPSTREAM=$(curl -sf --max-time 15 https://raw.githubusercontent.com/stockgame4343-blip/stock-rise/master/public/data/dates.json | python3 -c "import json,sys;d=json.load(sys.stdin);print(max(d) if d else '')" 2>/dev/null || echo '')
              if [ -n "$UPSTREAM" ] && [[ "$UPSTREAM" > "$LOCAL" ]]; then
                # 장중(미확정) 데이터로 승격하면 그날 이유/뉴스가 장중 스냅샷으로 박제됨 —
                # 업스트림 최신일이 is_final 일 때만 승격 (아니면 다음 슬롯에서 재시도)
                FINAL=$(curl -sf --max-time 20 "https://raw.githubusercontent.com/stockgame4343-blip/stock-rise/master/public/data/${UPSTREAM}.json" | python3 -c "import json,sys;print(json.load(sys.stdin).get('is_final', False))" 2>/dev/null || echo '')
                if [ "$FINAL" = "True" ]; then
                  echo "stock-history stale (local=${LOCAL:-none} < upstream=$UPSTREAM, final) — incremental 승격"
                  MODE="incremental"
                  ESCALATED="true"
                else
                  echo "업스트림 $UPSTREAM 아직 미확정(is_final=$FINAL) — 승격 보류"
                fi
              fi
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "escalated=$ESCALATED" >> $GITHUB_OUTPUT
          echo "결정 모드: $MODE (event=$EVENT, escalated=$ESCALATED)"

      # OHLC 를 실제 쓰는 모드만 대용량 cache 를 복원/저장한다.
      # 15분 marketmap-intraday 는 라이브 API 전용이라 전종목 500일 archive churn 불필요.
      - name: Restore OHLC cache
        if: steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'incremental' || steps.mode.outputs.mode == 'marketmap-only'
        uses: actions/cache@v4
        with:
          path: public/data/_cache/ohlc
          key: ohlc-cache-v1-${{ github.run_id }}
          restore-keys: |
            ohlc-cache-v1-
          save-always: true

      - name: Holiday gate
        id: gate
        run: |
          TODAY=$(date +%Y%m%d)
          MODE="${{ steps.mode.outputs.mode }}"
          # full / estimate-only 는 평일/주말 무관.
          # stale 승격 incremental 은 "밀린 과거 데이터 캐치업" 이므로 주말·공휴일 게이트를 통과시킨다.
          if [ "$MODE" = "incremental" ] && [ "${{ steps.mode.outputs.escalated }}" != "true" ]; then
            DOW=$(date +%u)
            if [ $DOW -ge 6 ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "주말 — incremental 스킵"
              exit 0
            fi
            # 한국 공휴일 스킵
            python3 -c "
          import sys
          sys.path.insert(0, '.')
          from collector.kr_holidays import is_kr_holiday
          import datetime
          if is_kr_holiday(datetime.date.today()):
            sys.exit(1)
          " || (echo "한국 공휴일 — 스킵" && echo "skip=true" >> $GITHUB_OUTPUT && exit 0)
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run build
        if: steps.gate.outputs.skip != 'true'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DAYS="${{ inputs.days }}"
          CUTOFF="${{ inputs.cutoff }}"
          LIMIT="${{ inputs.limit }}"
          BACKFILL="${{ inputs.backfill_days }}"
          # 스케줄 풀빌드(일요일)는 60일만 — 병합(무한 누적) 덕에 과거는 보존되므로
          # 매주 1년을 새로 만들 필요 없음. 4월 이전 1년 백필은 의도적으로 수동 실행:
          #   workflow_dispatch (mode=full, days=365) → 별도 커밋으로 프리뷰/리버트.
          [ -z "$DAYS" ] && DAYS=60
          [ -z "$CUTOFF" ] && CUTOFF=10
          [ -z "$LIMIT" ] && LIMIT=500
          [ -z "$BACKFILL" ] && BACKFILL=0
          echo "=== $MODE (days=$DAYS cutoff=$CUTOFF limit=$LIMIT backfill=$BACKFILL) ==="
          set -e
          if [ "$MODE" = "full" ]; then
            python3 scripts/build-history.py --days "$DAYS" --cutoff "$CUTOFF"
          elif [ "$MODE" = "estimate-only" ]; then
            python3 scripts/build-history.py --estimate-only --limit "$LIMIT"
          elif [ "$MODE" = "enrich-meta" ]; then
            # 기존 stock-history 테마/섹터 보강 + generic 사유 테마화 (OHLC 재빌드 없음, Naver 메타 패스)
            python3 scripts/build-history.py --enrich-meta
          elif [ "$MODE" = "enrich-news" ]; then
            # 백필 저신뢰 사유를 종목별 과거 뉴스 키워드 매칭으로 업그레이드 (stock-rise 방식)
            # limit=0 전체 / N 샘플,  days 입력을 news-pages 로 재사용(기본 20)
            python3 scripts/build-history.py --enrich-news --limit "$LIMIT" --news-pages "${DAYS:-20}"
          elif [ "$MODE" = "enrich-ohlc" ]; then
            # 이벤트에 거래량·거래대금·시총(역산) 채움 — OHLC 재수집 (전종목, limit=0)
            python3 scripts/build-history.py --enrich-ohlc --limit "$LIMIT"
          elif [ "$MODE" = "llm-refine-dry" ] || [ "$MODE" = "llm-refine" ]; then
            echo "llm-refine 전용 — 본빌드 스킵 (아래 LLM 스텝에서 실행, dry 는 --dry-run)"
          elif [ "$MODE" = "marketmap-intraday" ]; then
            # 장중 빠른 갱신 — 라이브 API 만, ~30s. hang 가드 10분.
            timeout -k 30 600 python3 scripts/build-history.py --marketmap-intraday
          elif [ "$MODE" = "marketmap-only" ]; then
            if [ "$BACKFILL" -gt 0 ]; then
              python3 scripts/build-history.py --marketmap-only --backfill-days "$BACKFILL"
            else
              timeout -k 30 600 python3 scripts/build-history.py --marketmap-only
            fi
          else
            # incremental — 최근 윈도우 급등 종목만 재빌드(--incremental) → 수 분 내 완료.
            #   전종목 OHLC fetch 를 하던 옛 방식이 네이버 throttle 겹치면 30분 가드(exit 124) 초과 → 상시 실패했음.
            #   -u: 버퍼 없이 진행 로그를 즉시 흘려 timeout kill 시에도 어디까지 갔는지 남긴다.
            # hang 가드: 2시간 넘으면 timeout(124)으로 실패시켜 concurrency 락을 풀어 준다.
            #   원래 30분 — 6/30~7/2 3일 실패 원인: 다일치 캐치업이면 movers 재빌드 ~40분에 더해
            #   말미 marketmap 전체 재빌드(2,768종목×1년 OHLC)가 캐시 콜드면 ~55분 → 총 ~95분이
            #   정상 진행인데도 가드에 걸려 처음부터 반복. 캐시가 차면 평시 15~25분으로 복귀.
            # full·수동 enrich/backfill 은 정상적으로 길 수 있어 무제한(job timeout-minutes 350 이 상한).
            timeout -k 30 7200 python3 -u scripts/build-history.py --incremental --days 30 --cutoff "$CUTOFF"
          fi

      # LLM 사유 정제 — 당일 급등의 제네릭 사유("~테마 강세" 등)를 뉴스 근거 구체 사유로 교체.
      # continue-on-error: LLM 이 죽어도 빌드·커밋은 정상 진행 (사이트는 LLM 비의존).
      # llm-refine-dry(수동 dispatch)는 데이터 미변경 검증용 — 대조표만 로그로 출력.
      - name: LLM reason refinement
        if: steps.gate.outputs.skip != 'true' && (steps.mode.outputs.mode == 'incremental' || steps.mode.outputs.mode == 'llm-refine-dry' || steps.mode.outputs.mode == 'llm-refine')
        continue-on-error: true
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REFINE_DATE: ${{ github.event.inputs.date }}
        run: |
          EXTRA=""
          if [ "${{ steps.mode.outputs.mode }}" = "llm-refine-dry" ]; then EXTRA="--dry-run"; fi
          if [ -n "$REFINE_DATE" ]; then EXTRA="$EXTRA --date $REFINE_DATE"; fi
          python3 -u scripts/build-history.py --llm-refine $EXTRA

      # 오늘의 대장 캘린더(샘플2) — stock-rise 일별 대장 3종을 누적 계산. 비핵심이라 실패해도 본빌드 유지.
      # !cancelled(): 앞 build 스텝이 marketmap OHLC 타임아웃(124)으로 실패해도 실행 —
      #   대장캘린더는 stock-rise 상류를 직접 읽으므로 whyrise 증분 성공과 무관하게 최신화 가능.
      #   (marketmap 실패가 캘린더 동결로 번지던 결합 해제)
      - name: Build leaders calendar
        if: ${{ !cancelled() && steps.gate.outputs.skip != 'true' && (steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'incremental') }}
        continue-on-error: true
        run: node scripts/build_leaders_calendar.js

      - name: Diff guard (full only)
        if: steps.gate.outputs.skip != 'true' && steps.mode.outputs.mode == 'full'
        run: |
          # 풀빌드가 50% 이상 파일 다 새로 쓰면 의심 (덮어쓰기 사고 방지)
          CHANGED=$(git diff --name-only public/data/stock-history/ | wc -l)
          TOTAL=$(ls public/data/stock-history/*.json 2>/dev/null | wc -l)
          [ "$TOTAL" = "0" ] && TOTAL=1
          PERCENT=$((CHANGED * 100 / TOTAL))
          echo "변경 $CHANGED / $TOTAL = $PERCENT%"
          if [ "$PERCENT" -gt 80 ] && [ "$TOTAL" -gt 100 ]; then
            echo "::warning::풀빌드 변경률 $PERCENT% — 덮어쓰기 사고 의심"
          fi

      # 빌드 산출물을 artifact 로 먼저 보관 — push 실패해도 90일간 다운로드 가능
      - name: Upload build artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_id }}
          path: |
            public/data/report-summary.json
            public/data/stock-history/
            public/sitemap.xml
          retention-days: 90
          if-no-files-found: warn

      # ── 오늘의 대장 텔레그램 자동 게시 ──
      # GitHub schedule 크론은 누락이 잦다. 그래서 전용 워크플로(telegram-daily.yml)의 크론에만
      # 의존하지 않고, '신뢰도 높은 외부 디스패치(marketmap-intraday) 포함 마감후 모든 실행'에
      # 게시 기회를 준다. 마커(_telegram-posted.json)로 하루 1회만 실제 게시(중복 방지).
      # 어떤 트리거가 살아있든 하나만 15:45 이후 돌면 게시됨 → 크론 누락에 강함.
      # llm-refine(-dry) 수동 dispatch 는 게시 편승 제외 — 주말·저녁 백필이 마커 상태에 따라
      # 대장 게시를 오발사하는 것 방지 (오늘자 데이터 부재 가드에만 기대지 않는다)
      - name: Telegram gate
        id: tg
        if: steps.gate.outputs.skip != 'true' && steps.mode.outputs.mode != 'llm-refine-dry' && steps.mode.outputs.mode != 'llm-refine'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          POST=false
          POST_INTRADAY=false
          NOW_MIN=$((10#$(date +%H) * 60 + 10#$(date +%M)))   # TZ=Asia/Seoul, 15:45=945, 09:30=570
          TODAY=$(date +%Y%m%d)
          LAST=$(python3 -c "import json;print(json.load(open('public/data/_telegram-posted.json')).get('last',''))" 2>/dev/null || echo '')
          LAST_IN=$(python3 -c "import json;print(json.load(open('public/data/_telegram-intraday-posted.json')).get('last',''))" 2>/dev/null || echo '')
          if [ -n "$TG_TOKEN" ] && [ "$NOW_MIN" -ge 945 ] && [ "$LAST" != "$TODAY" ]; then POST=true; fi
          # 09:30~11:00 첫 실행에서 장중 주도 게시 — 외부 cron-job.org dispatch(15분 그리드)로 신뢰성 확보(GitHub schedule 누락 보완)
          if [ -n "$TG_TOKEN" ] && [ "$NOW_MIN" -ge 570 ] && [ "$NOW_MIN" -lt 660 ] && [ "$LAST_IN" != "$TODAY" ]; then POST_INTRADAY=true; fi
          echo "post=$POST" >> $GITHUB_OUTPUT
          echo "post_intraday=$POST_INTRADAY" >> $GITHUB_OUTPUT
          echo "텔레그램 게이트: post=$POST intraday=$POST_INTRADAY (now_min=$NOW_MIN last=$LAST last_in=$LAST_IN today=$TODAY token=$([ -n "$TG_TOKEN" ] && echo set || echo none))"

      - name: Setup Node (telegram)
        if: steps.tg.outputs.post == 'true' || steps.tg.outputs.post_intraday == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache Playwright (telegram)
        if: steps.tg.outputs.post == 'true' || steps.tg.outputs.post_intraday == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1
      # 장중 주도(09:30) — 신뢰성 높은 외부 dispatch 경로에 업힘. 마커로 하루 1회.
      - name: Post to Telegram (intraday)
        if: steps.tg.outputs.post_intraday == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install playwright@1.56.1 --no-save
          npx playwright install --with-deps chromium
          node scripts/telegram_intraday_leaders.js || true
          rm -f telegram-intraday-*.png
          # 마커(public/data/_telegram-intraday-posted.json)는 아래 Commit & push 가 함께 커밋
      - name: Post to Telegram
        if: steps.tg.outputs.post == 'true'
        continue-on-error: true   # 게시 실패해도 본빌드/푸시는 정상 진행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install playwright@1.56.1 --no-save
          npx playwright install --with-deps chromium
          node scripts/telegram_daily_leader.js || true
          rm -f telegram-daily.png
          # 게시 마커(public/data/_telegram-posted.json)는 아래 Commit & push 가 함께 커밋

      # !cancelled(): build 스텝이 marketmap 타임아웃(124)으로 실패해도, 그 전에 디스크에 완성된
      #   증분 stock-history·report·rise-history + 갱신된 대장캘린더를 커밋한다.
      #   (marketmap은 marketmap-intraday 런들이 별도로 최신화하므로 증분의 marketmap 재빌드 실패는 비치명적)
      #   git add + diff-quiet 가드로, 변경 없으면 no-op — 조기 실패로 쓸 게 없으면 그냥 넘어감.
      - name: Commit & push
        if: ${{ !cancelled() && steps.gate.outputs.skip != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 빌드 산출물 stage — sitemap·종목 프리렌더도 빌드 산출물
          # (git add 가 아래 checkout/clean 보다 먼저라 stage 분은 보존됨)
          git add public/data/ public/sitemap.xml public/stock/
          # 추가 unstaged 변경 (예: pip cache·기타) 도 stage 또는 버림
          git checkout -- . || true   # 추적 중인 다른 파일 변경 복원
          git clean -fd -e 'public/data/_cache' || true  # 추적 안 되는 파일 제거 (cache 디렉토리는 보존)
          git diff --staged --quiet && echo "변경 없음" && exit 0
          git commit -m "build: 인덱스+버블+리포트 갱신 ($(date +%Y%m%d))"
          # 트리거한 브랜치로 커밋·푸시 — 스케줄(master)이든 수동 dispatch(feature 브랜치)든
          # 자기 브랜치에 rebase 후 push. master 하드코딩 시 feature 브랜치 백필이 add/add 충돌로 실패함.
          BRANCH="${GITHUB_REF_NAME}"
          echo "push 대상 브랜치: $BRANCH"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            REBASE_OK=false
            if git -c rebase.autoStash=true rebase "origin/$BRANCH"; then
              REBASE_OK=true
            else
              # override-sync 는 종목 파일 1개만 최신 원격에서 재생성해 push한다.
              # 전역 빌드와 그 파일만 충돌하면 원격(override 반영본)을 보존하고,
              # 그 외 충돌은 자동 판단하지 않고 기존 재시도/실패 경로로 넘긴다.
              CONFLICTS=$(git diff --name-only --diff-filter=U)
              BAD=$(printf '%s\n' "$CONFLICTS" | grep -Ev '^public/data/stock-history/[0-9]{6}\.json$' || true)
              if [ -n "$CONFLICTS" ] && [ -z "$BAD" ]; then
                echo "override-sync 종목 파일 충돌 - 최신 원격본 보존"
                while IFS= read -r file; do
                  [ -z "$file" ] && continue
                  # rebase 중 --ours = 새 upstream(origin/$BRANCH).
                  git checkout --ours -- "$file"
                  git add "$file"
                done <<< "$CONFLICTS"
                if GIT_EDITOR=true git rebase --continue; then
                  REBASE_OK=true
                fi
              fi
            fi
            if [ "$REBASE_OK" = "true" ]; then
              if git push origin "HEAD:$BRANCH"; then
                echo "push 성공 (시도 $attempt, branch=$BRANCH)"
                exit 0
              fi
            else
              echo "rebase 충돌 - abort 후 재시도"
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "::error::push 3회 실패"
          exit 1

  # admin override 저장/삭제 전용 경량 job — 대상 종목 파일 1개만 갱신.
  # concurrency 를 종목+날짜별로 분리: 다른 종목/날짜 dispatch 가 pending 교체로 유실되지 않는다.
  # 같은 종목+날짜의 연속 저장은 최신 상태 하나로 코얼레싱해도 결과가 같고, 서로 다른 날짜가
  # 같은 종목 파일을 동시에 갱신하면 아래 '최신 원격에서 재생성' 루프가 직렬 수렴시킨다.
  # 산출물이 stock-history/{ticker}.json 1개뿐이라 전역 build job 과 공유 파생물 경합이 없고,
  # Telegram·artifact·대장캘린더 등 부수효과 스텝도 타지 않는다.
  override-sync:
    if: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'override-saved' && github.event.client_payload.ticker != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    concurrency:
      group: build-history-override-${{ github.event.client_payload.ticker }}-${{ github.event.client_payload.date }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync & push (재생성 재시도)
        env:
          OV_TICKER: ${{ github.event.client_payload.ticker }}
          OV_DATE: ${{ github.event.client_payload.date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"
          TARGET="public/data/stock-history/${OV_TICKER}.json"
          # push 가 전역 빌드/다른 override push 와 경합하면 rebase 대신 '최신 원격에서 재계산'으로
          # 재시도 — 이 job 은 대상 1파일만 다시 만들므로 재계산이 곧 안전한 충돌 해소다.
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git reset --hard FETCH_HEAD
            if ! timeout -k 30 600 python3 -u scripts/build-history.py --override-sync --ticker "$OV_TICKER" --date "$OV_DATE"; then
              echo "override-sync 빌드 실패 (시도 $attempt)"
              sleep 5
              continue
            fi
            git add "$TARGET"
            if git diff --staged --quiet; then
              echo "변경 없음 — 완료 (시도 $attempt)"
              exit 0
            fi
            git commit -m "build: override-sync ${OV_TICKER} @ ${OV_DATE}"
            if git push origin "HEAD:$BRANCH"; then
              echo "push 성공 (시도 $attempt)"
              exit 0
            fi
            echo "push 경합 (시도 $attempt) — 최신 상태에서 재생성"
            sleep 5
          done
          echo "::error::override-sync 3회 실패 (${OV_TICKER} @ ${OV_DATE})"
          exit 1
