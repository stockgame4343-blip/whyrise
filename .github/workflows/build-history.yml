name: 종목 인덱스 빌드 (1년치)

# 평일 KST 매 15분 (09:07/09:22/.../15:22) — marketmap-intraday 빠른 갱신.
#   GitHub cron 만성 누락(하루 3회 수준 실행) 보완 2중화:
#   ① cron 분을 :10/:40 → 비혼잡 분(:7/:22/:37/:52)으로 이동 + 15분 그리드로 트리거 포인트 2배
#   ② stock-rise cron-trigger(외부 cron-job.org, 신뢰성 높음)가 repository_dispatch
#      'marketmap-intraday' 를 같은 그리드로 발사 — 둘 중 먼저 온 쪽이 실행 (concurrency 코얼레싱)
# 평일 KST 15:40 (UTC 06:40) — incremental (장 마감 직후 stock-history + marketmap)
# 일요일 KST 06:00 (UTC 21:00 토) — full rebuild
# 모드 판정은 "트리거한 cron 문자열" 기준 (github.event.schedule) — GitHub cron 지연·누락에 안전.
# 보강: 마감 후 intraday 런이 build-meta.json 대비 업스트림이 앞서 있으면 incremental 자동 승격.
on:
  schedule:
    - cron: '7,22,37,52 0,1,2,3,4,5 * * 1-5'  # 평일 KST 09:07~14:52 — 15분 주기 (비혼잡 분)
    - cron: '7,22 6 * * 1-5'             # 평일 KST 15:07/15:22 — 마감 직전 구간
    - cron: '40 6 * * 1-5'               # 평일 KST 15:40 — incremental (장 마감 직후)
    - cron: '10 7 * * 1-5'               # 평일 KST 16:10 — 정정 종가
    - cron: '0 21 * * 6'                 # 일요일 KST 06:00 = 토요일 UTC 21:00 full
  workflow_dispatch:
    inputs:
      mode:
        description: 'full | incremental | estimate-only | marketmap-only | marketmap-intraday'
        required: false
        default: 'incremental'
        type: choice
        options: [full, incremental, estimate-only, marketmap-only, marketmap-intraday]
      days:
        description: '풀빌드 기간 (full mode)'
        required: false
        default: '365'
      cutoff:
        description: '컷오프 % (인덱스 저장 최저)'
        required: false
        default: '10'
      limit:
        description: 'estimate-only 처리 한도'
        required: false
        default: '500'
      backfill_days:
        description: 'marketmap-only 백필 영업일 수 (0 = 백필 없음, 252 = 1년)'
        required: false
        default: '0'
  repository_dispatch:
    types: [rebuild-history, override-saved, marketmap-intraday]

env:
  TZ: Asia/Seoul

concurrency:
  group: build-history
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 350      # 풀빌드 ~3시간 여유

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # OHLC 디스크 캐시 — 백필이 중간 실패해도 다음 실행은 즉시 hit.
      # save-always: true 로 job 실패해도 캐시 저장.
      - name: Restore OHLC cache
        uses: actions/cache@v4
        with:
          path: public/data/_cache/ohlc
          key: ohlc-cache-v1-${{ github.run_id }}
          restore-keys: |
            ohlc-cache-v1-
          save-always: true

      - name: Install dependencies
        run: |
          # 표준 라이브러리만 사용 — 외부 패키지 불필요 (urllib, json, etc.)
          # 향후 BeautifulSoup·requests 가 필요하면 여기서 install
          python --version

      - name: Determine mode
        id: mode
        run: |
          EVENT="${{ github.event_name }}"
          INPUT_MODE="${{ inputs.mode }}"
          ESCALATED="false"
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          elif [ "$EVENT" = "schedule" ]; then
            # 실행 시각이 아니라 "어떤 cron 이 트리거했는가" 로 판정 —
            # GitHub cron 은 1~3시간 지연·누락이 일상이라 벽시계 판정은
            # incremental/full 을 전부 marketmap-intraday 로 오판정했음 (5/24~6/9 stock-history 동결 원인).
            SCHED="${{ github.event.schedule }}"
            case "$SCHED" in
              '0 21 * * 6')   MODE="full" ;;          # 일요일 KST 06:00 풀빌드
              '40 6 * * 1-5') MODE="incremental" ;;   # 평일 KST 15:40 장마감 incremental
              *)              MODE="marketmap-intraday" ;;
            esac
          elif [ "$EVENT" = "repository_dispatch" ]; then
            # stock-rise cron-trigger(외부 cron-job.org)의 cross-repo dispatch — type 으로 분기
            if [ "${{ github.event.action }}" = "marketmap-intraday" ]; then
              MODE="marketmap-intraday"
            else
              MODE="estimate-only"
            fi
          else
            MODE="incremental"
          fi
          # 누락 보정: cron/외부 디스패치 어느 경로로 왔든, 마감 후(KST 15:40+) intraday 런이
          # 업스트림 stock-rise 대비 stale 이면 incremental 로 승격 (1일 1회만 발동 — 승격 빌드가 meta 를 갱신).
          # GitHub cron 이 통째로 죽은 날도 외부 디스패치가 이 경로로 stock-history 를 살린다.
          if [ "$MODE" = "marketmap-intraday" ]; then
            NOW_MIN=$((10#$(date +%H) * 60 + 10#$(date +%M)))   # TZ=Asia/Seoul
            if [ "$NOW_MIN" -ge 940 ]; then
              LOCAL=$(python3 -c "import json;print(json.load(open('public/data/build-meta.json')).get('latest_stockrise_date',''))" 2>/dev/null || echo '')
              UPSTREAM=$(curl -sf --max-time 15 https://raw.githubusercontent.com/stockgame4343-blip/stock-rise/master/public/data/dates.json | python3 -c "import json,sys;d=json.load(sys.stdin);print(max(d) if d else '')" 2>/dev/null || echo '')
              if [ -n "$UPSTREAM" ] && [[ "$UPSTREAM" > "$LOCAL" ]]; then
                # 장중(미확정) 데이터로 승격하면 그날 이유/뉴스가 장중 스냅샷으로 박제됨 —
                # 업스트림 최신일이 is_final 일 때만 승격 (아니면 다음 슬롯에서 재시도)
                FINAL=$(curl -sf --max-time 20 "https://raw.githubusercontent.com/stockgame4343-blip/stock-rise/master/public/data/${UPSTREAM}.json" | python3 -c "import json,sys;print(json.load(sys.stdin).get('is_final', False))" 2>/dev/null || echo '')
                if [ "$FINAL" = "True" ]; then
                  echo "stock-history stale (local=${LOCAL:-none} < upstream=$UPSTREAM, final) — incremental 승격"
                  MODE="incremental"
                  ESCALATED="true"
                else
                  echo "업스트림 $UPSTREAM 아직 미확정(is_final=$FINAL) — 승격 보류"
                fi
              fi
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "escalated=$ESCALATED" >> $GITHUB_OUTPUT
          echo "결정 모드: $MODE (event=$EVENT, escalated=$ESCALATED)"

      - name: Holiday gate
        id: gate
        run: |
          TODAY=$(date +%Y%m%d)
          MODE="${{ steps.mode.outputs.mode }}"
          # full / estimate-only 는 평일/주말 무관.
          # stale 승격 incremental 은 "밀린 과거 데이터 캐치업" 이므로 주말·공휴일 게이트를 통과시킨다.
          if [ "$MODE" = "incremental" ] && [ "${{ steps.mode.outputs.escalated }}" != "true" ]; then
            DOW=$(date +%u)
            if [ $DOW -ge 6 ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "주말 — incremental 스킵"
              exit 0
            fi
            # 한국 공휴일 스킵
            python3 -c "
          import sys
          sys.path.insert(0, '.')
          from collector.kr_holidays import is_kr_holiday
          import datetime
          if is_kr_holiday(datetime.date.today()):
            sys.exit(1)
          " || (echo "한국 공휴일 — 스킵" && echo "skip=true" >> $GITHUB_OUTPUT && exit 0)
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run build
        if: steps.gate.outputs.skip != 'true'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DAYS="${{ inputs.days }}"
          CUTOFF="${{ inputs.cutoff }}"
          LIMIT="${{ inputs.limit }}"
          BACKFILL="${{ inputs.backfill_days }}"
          # 스케줄 풀빌드(일요일)는 60일만 — 병합(무한 누적) 덕에 과거는 보존되므로
          # 매주 1년을 새로 만들 필요 없음. 4월 이전 1년 백필은 의도적으로 수동 실행:
          #   workflow_dispatch (mode=full, days=365) → 별도 커밋으로 프리뷰/리버트.
          [ -z "$DAYS" ] && DAYS=60
          [ -z "$CUTOFF" ] && CUTOFF=10
          [ -z "$LIMIT" ] && LIMIT=500
          [ -z "$BACKFILL" ] && BACKFILL=0
          echo "=== $MODE (days=$DAYS cutoff=$CUTOFF limit=$LIMIT backfill=$BACKFILL) ==="
          set -e
          if [ "$MODE" = "full" ]; then
            python3 scripts/build-history.py --days "$DAYS" --cutoff "$CUTOFF"
          elif [ "$MODE" = "estimate-only" ]; then
            python3 scripts/build-history.py --estimate-only --limit "$LIMIT"
          elif [ "$MODE" = "marketmap-intraday" ]; then
            # 장중 빠른 갱신 — 라이브 API 만, ~30s
            python3 scripts/build-history.py --marketmap-intraday
          elif [ "$MODE" = "marketmap-only" ]; then
            if [ "$BACKFILL" -gt 0 ]; then
              python3 scripts/build-history.py --marketmap-only --backfill-days "$BACKFILL"
            else
              python3 scripts/build-history.py --marketmap-only
            fi
          else
            # incremental — 짧은 기간만 fetch + 머지
            python3 scripts/build-history.py --days 30 --cutoff "$CUTOFF"
          fi

      # 오늘의 대장 캘린더(샘플2) — stock-rise 일별 대장 3종을 누적 계산. 비핵심이라 실패해도 본빌드 유지.
      - name: Build leaders calendar
        if: steps.gate.outputs.skip != 'true' && (steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'incremental')
        continue-on-error: true
        run: node scripts/build_leaders_calendar.js

      - name: Diff guard (full only)
        if: steps.gate.outputs.skip != 'true' && steps.mode.outputs.mode == 'full'
        run: |
          # 풀빌드가 50% 이상 파일 다 새로 쓰면 의심 (덮어쓰기 사고 방지)
          CHANGED=$(git diff --name-only public/data/stock-history/ | wc -l)
          TOTAL=$(ls public/data/stock-history/*.json 2>/dev/null | wc -l)
          [ "$TOTAL" = "0" ] && TOTAL=1
          PERCENT=$((CHANGED * 100 / TOTAL))
          echo "변경 $CHANGED / $TOTAL = $PERCENT%"
          if [ "$PERCENT" -gt 80 ] && [ "$TOTAL" -gt 100 ]; then
            echo "::warning::풀빌드 변경률 $PERCENT% — 덮어쓰기 사고 의심"
          fi

      # 빌드 산출물을 artifact 로 먼저 보관 — push 실패해도 90일간 다운로드 가능
      - name: Upload build artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_id }}
          path: |
            public/data/report-summary.json
            public/data/stock-history/
            public/sitemap.xml
          retention-days: 90
          if-no-files-found: warn

      - name: Commit & push
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 빌드 산출물 stage (public/data/)
          git add public/data/
          # 추가 unstaged 변경 (예: pip cache·기타) 도 stage 또는 버림
          git checkout -- . || true   # 추적 중인 다른 파일 변경 복원
          git clean -fd -e 'public/data/_cache' || true  # 추적 안 되는 파일 제거 (cache 디렉토리는 보존)
          git diff --staged --quiet && echo "변경 없음" && exit 0
          git commit -m "build: 인덱스+버블+리포트 갱신 ($(date +%Y%m%d))"
          # push 시 origin 변경 있으면 autostash rebase 후 retry (최대 3회)
          for attempt in 1 2 3; do
            git fetch origin master
            if git -c rebase.autoStash=true rebase origin/master; then
              if git push; then
                echo "push 성공 (시도 $attempt)"
                exit 0
              fi
            else
              echo "rebase 충돌 — abort 후 재시도"
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "::error::push 3회 실패"
          exit 1
